<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✧ Cumpleaños Estelares ✧</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #fff;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    
    .stars {
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #fff, transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 90px 40px, #fff, transparent),
        radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 160px 120px, #fff, transparent),
        radial-gradient(2px 2px at 200px 50px, rgba(255,255,255,0.7), transparent);
      background-size: 250px 150px;
      animation: twinkle 8s ease-in-out infinite alternate;
    }
    
    @keyframes twinkle { 0% { opacity: 0.7; } 100% { opacity: 1; } }
    
    .container {
      position: relative;
      z-index: 10;
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    header { text-align: center; margin-bottom: 2rem; }
    
    header h1 {
      font-family: Georgia, serif;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    header h1 span { font-size: 2.5rem; }
    header p { color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2em; margin-top: 0.5rem; }
    
    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      margin-top: 0.75rem;
    }
    
    .sync-badge.loading {
      background: rgba(234, 179, 8, 0.2);
      border-color: rgba(234, 179, 8, 0.3);
      color: #fde047;
    }
    
    .sync-badge.error {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }
    
    .today-alert {
      background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(249,115,22,0.2));
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    
    .today-alert.show { display: flex; align-items: center; gap: 0.75rem; }
    .today-alert .icon { font-size: 1.5rem; }
    .today-alert .title { font-weight: 600; color: #fde68a; font-size: 0.9rem; }
    .today-alert .names { color: rgba(254,243,199,0.8); font-size: 0.85rem; }
    
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .stats { display: flex; gap: 2rem; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 300; }
    .stat-value.highlight { color: #fbbf24; }
    .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; }
    
    .btn-group { display: flex; gap: 0.5rem; }
    
    .btn {
      border: none;
      border-radius: 0.75rem;
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      color: #fff;
    }
    
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #9333ea); }
    .btn-primary:hover { background: linear-gradient(135deg, #8b5cf6, #a855f7); }
    .btn-secondary { background: rgba(255,255,255,0.1); }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .btn-success { background: linear-gradient(135deg, #059669, #0d9488); width: 100%; padding: 0.75rem; }
    .btn-success:hover { background: linear-gradient(135deg, #10b981, #14b8a6); }
    .btn-success:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-email { background: linear-gradient(135deg, #db2777, #e11d48); padding: 0.9rem 1.5rem; }
    .btn-email:hover { background: linear-gradient(135deg, #ec4899, #f43f5e); }
    
    .form-container {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1rem;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    
    .form-container.show { display: block; }
    .form-title { font-size: 1rem; font-weight: 500; margin-bottom: 1rem; color: #e2e8f0; }
    
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; }
    
    .form-input, .form-select {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(30,41,59,0.5);
      border: 1px solid #334155;
      border-radius: 0.75rem;
      color: #fff;
      font-size: 0.9rem;
      transition: border-color 0.3s;
    }
    
    .form-input:focus, .form-select:focus { outline: none; border-color: #a855f7; }
    .form-select option { background: #1e293b; }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    
    .zodiac-preview {
      background: rgba(30,41,59,0.3);
      border: 1px solid rgba(51,65,85,0.5);
      border-radius: 0.75rem;
      padding: 0.6rem;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 1rem;
      display: none;
    }
    
    .zodiac-preview.show { display: block; }
    
    .filters { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    
    .filter-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid transparent;
      border-radius: 0.75rem;
      padding: 0.5rem 0.9rem;
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .filter-btn:hover { background: rgba(255,255,255,0.1); }
    .filter-btn.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2); }
    
    .contacts-list { display: flex; flex-direction: column; gap: 0.5rem; }
    
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #64748b;
    }
    
    .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.9rem; }
    
    .loading-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #94a3b8;
    }
    
    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .contact-card {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1rem;
      padding: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s;
    }
    
    .contact-card:hover { border-color: rgba(255,255,255,0.2); }
    .contact-card:hover .card-actions { opacity: 1; }
    
    .contact-info { display: flex; align-items: center; gap: 0.75rem; }
    .contact-symbol { font-size: 1.5rem; }
    .contact-name { font-weight: 500; font-size: 0.95rem; }
    .contact-details { font-size: 0.75rem; color: #94a3b8; }
    
    .contact-right { display: flex; align-items: center; gap: 0.5rem; }
    
    .days-badge {
      padding: 0.3rem 0.6rem;
      border-radius: 0.5rem;
      font-size: 0.75rem;
      font-weight: 500;
    }
    
    .days-badge.today { background: #f59e0b; color: #451a03; }
    .days-badge.soon { background: rgba(168,85,247,0.3); color: #e9d5ff; }
    .days-badge.later { background: rgba(51,65,85,0.5); color: #cbd5e1; }
    
    .card-actions { opacity: 0; display: flex; gap: 0.25rem; transition: opacity 0.3s; }
    
    .action-btn {
      background: none;
      border: none;
      padding: 0.4rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.3s;
      color: #fff;
    }
    
    .action-btn:hover { background: rgba(255,255,255,0.1); }
    .action-btn.whatsapp { color: #22c55e; }
    .action-btn.whatsapp:hover { background: rgba(34,197,94,0.2); }
    
    .email-section { text-align: center; margin-top: 2rem; display: none; }
    .email-section.show { display: block; }
    
    footer { 
      text-align: center; 
      margin-top: 3rem; 
      color: #475569; 
      font-size: 0.75rem; 
    }
    
    footer a { color: #818cf8; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    
    .notification {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 0.75rem 1.25rem;
      border-radius: 0.75rem;
      font-size: 0.85rem;
      z-index: 100;
      transform: translateX(150%);
      transition: transform 0.3s;
    }
    
    .notification.show { transform: translateX(0); }
    .notification.success { background: rgba(16,185,129,0.9); }
    .notification.info { background: rgba(51,65,85,0.9); }
    .notification.error { background: rgba(239,68,68,0.9); }
    
    /* Element colors */
    .element-fire { background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,107,53,0.05)); }
    .element-earth { background: linear-gradient(135deg, rgba(74,222,128,0.15), rgba(74,222,128,0.05)); }
    .element-air { background: linear-gradient(135deg, rgba(56,189,248,0.15), rgba(56,189,248,0.05)); }
    .element-water { background: linear-gradient(135deg, rgba(129,140,248,0.15), rgba(129,140,248,0.05)); }
  </style>
</head>
<body>
  <div class="stars"></div>
  
  <div class="notification" id="notification"></div>
  
  <div class="container">
    <header>
      <h1><span>✧</span> Cumpleaños Estelares <span>✧</span></h1>
      <p>Recordatorios astrológicos</p>
      <div class="sync-badge loading" id="syncBadge">
        <span>⟳</span> Conectando con Google Sheets...
      </div>
    </header>
    
    <div class="today-alert" id="todayAlert">
      <div class="icon">🎂</div>
      <div>
        <div class="title">¡Cumpleaños hoy!</div>
        <div class="names" id="todayNames"></div>
      </div>
    </div>
    
    <div class="stats-bar">
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="totalCount">-</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-value highlight" id="weekCount">-</div>
          <div class="stat-label">Esta semana</div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="refreshBtn" title="Actualizar">⟳</button>
        <button class="btn btn-primary" id="toggleFormBtn">+ Agregar</button>
      </div>
    </div>
    
    <div class="form-container" id="formContainer">
      <div class="form-title">Nuevo contacto</div>
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" class="form-input" id="nameInput" placeholder="Nombre del contacto">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Mes</label>
          <select class="form-select" id="monthSelect"></select>
        </div>
        <div class="form-group">
          <label>Día</label>
          <select class="form-select" id="daySelect"></select>
        </div>
      </div>
      <div class="form-group">
        <label>Teléfono WhatsApp (opcional)</label>
        <input type="text" class="form-input" id="phoneInput" placeholder="+51999888777">
      </div>
      <div class="zodiac-preview" id="zodiacPreview"></div>
      <button class="btn btn-success" id="submitBtn" disabled>Agregar contacto</button>
    </div>
    
    <div class="filters">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="week">Esta semana</button>
      <button class="filter-btn" data-filter="month">Este mes</button>
    </div>
    
    <div class="contacts-list" id="contactsList">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Cargando desde Google Sheets...</p>
      </div>
    </div>
    
    <div class="email-section" id="emailSection">
      <button class="btn btn-email" id="emailBtn">
        ✉ Enviar recordatorio por email
      </button>
    </div>
    
    <footer>
      <p>✧ Conectado a <a href="https://docs.google.com/spreadsheets/d/11OispM4b4bGDTn7_IskeCP-bWrxE2mRwEUYalyNGLlA/edit" target="_blank">Google Sheets</a> ✧</p>
    </footer>
  </div>

  <script>
    // URL de tu Web App de Google Apps Script
    const API_URL = 'https://script.google.com/macros/s/AKfycby2HyUB4WxDTC1VGaIxy_34O4qFNUSxxVaKgrsj4a28hftLaIdu47dzCAkUl-r-MAr9YA/exec';
    
    const ZODIAC_SIGNS = [
      { name: 'Aries', symbol: '♈', start: [3, 21], end: [4, 19], element: 'fire' },
      { name: 'Tauro', symbol: '♉', start: [4, 20], end: [5, 20], element: 'earth' },
      { name: 'Géminis', symbol: '♊', start: [5, 21], end: [6, 20], element: 'air' },
      { name: 'Cáncer', symbol: '♋', start: [6, 21], end: [7, 22], element: 'water' },
      { name: 'Leo', symbol: '♌', start: [7, 23], end: [8, 22], element: 'fire' },
      { name: 'Virgo', symbol: '♍', start: [8, 23], end: [9, 22], element: 'earth' },
      { name: 'Libra', symbol: '♎', start: [9, 23], end: [10, 22], element: 'air' },
      { name: 'Escorpio', symbol: '♏', start: [10, 23], end: [11, 21], element: 'water' },
      { name: 'Sagitario', symbol: '♐', start: [11, 22], end: [12, 21], element: 'fire' },
      { name: 'Capricornio', symbol: '♑', start: [12, 22], end: [1, 19], element: 'earth' },
      { name: 'Acuario', symbol: '♒', start: [1, 20], end: [2, 18], element: 'air' },
      { name: 'Piscis', symbol: '♓', start: [2, 19], end: [3, 20], element: 'water' },
    ];

    const MONTHS = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                    'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    const MONTHS_SHORT = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

    let contacts = [];
    let currentFilter = 'all';

    // DOM elements
    const toggleFormBtn = document.getElementById('toggleFormBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const formContainer = document.getElementById('formContainer');
    const nameInput = document.getElementById('nameInput');
    const monthSelect = document.getElementById('monthSelect');
    const daySelect = document.getElementById('daySelect');
    const phoneInput = document.getElementById('phoneInput');
    const zodiacPreview = document.getElementById('zodiacPreview');
    const submitBtn = document.getElementById('submitBtn');
    const contactsList = document.getElementById('contactsList');
    const totalCount = document.getElementById('totalCount');
    const weekCount = document.getElementById('weekCount');
    const todayAlert = document.getElementById('todayAlert');
    const todayNames = document.getElementById('todayNames');
    const emailSection = document.getElementById('emailSection');
    const emailBtn = document.getElementById('emailBtn');
    const notification = document.getElementById('notification');
    const syncBadge = document.getElementById('syncBadge');

    // Initialize
    async function init() {
      populateSelects();
      setupEventListeners();
      await loadContactsFromSheets();
    }

    // Callback global para JSONP
    window.handleSheetData = function(data) {
      contacts = data;
      syncBadge.className = 'sync-badge';
      syncBadge.innerHTML = '<span>✓</span> Sincronizado con Google Sheets';
      render();
      showNotification('Datos cargados ✓', 'success');
    };

    function loadContactsFromSheets() {
      syncBadge.className = 'sync-badge loading';
      syncBadge.innerHTML = '<span>⟳</span> Sincronizando...';
      
      // Eliminar script anterior si existe
      const oldScript = document.getElementById('sheetScript');
      if (oldScript) oldScript.remove();
      
      // Crear nuevo script para JSONP
      const script = document.createElement('script');
      script.id = 'sheetScript';
      script.src = API_URL + '?callback=handleSheetData&t=' + Date.now();
      script.onerror = function() {
        syncBadge.className = 'sync-badge error';
        syncBadge.innerHTML = '<span>✕</span> Error de conexión';
        contactsList.innerHTML = `
          <div class="empty-state">
            <div class="icon">⚠️</div>
            <p>No se pudo conectar con Google Sheets</p>
            <p style="font-size: 0.75rem; margin-top: 0.5rem;">Verifica tu conexión a internet</p>
          </div>
        `;
      };
      document.body.appendChild(script);
    }

    function addContactToSheets(contact) {
      return new Promise((resolve) => {
        // Crear un iframe oculto para enviar datos
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = API_URL;
        form.target = 'hidden_iframe';
        form.style.display = 'none';
        
        // Agregar datos como campos ocultos
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'data';
        input.value = JSON.stringify(contact);
        form.appendChild(input);
        
        // Crear iframe oculto
        let iframe = document.getElementById('hidden_iframe');
        if (!iframe) {
          iframe = document.createElement('iframe');
          iframe.name = 'hidden_iframe';
          iframe.id = 'hidden_iframe';
          iframe.style.display = 'none';
          document.body.appendChild(iframe);
        }
        
        document.body.appendChild(form);
        form.submit();
        form.remove();
        
        // Esperar un poco y recargar
        setTimeout(() => {
          loadContactsFromSheets();
          resolve(true);
        }, 2000);
      });
    }

    function populateSelects() {
      MONTHS.forEach((m, i) => {
        monthSelect.innerHTML += `<option value="${i + 1}">${m}</option>`;
      });
      for (let i = 1; i <= 31; i++) {
        daySelect.innerHTML += `<option value="${i}">${i}</option>`;
      }
    }

    function setupEventListeners() {
      toggleFormBtn.addEventListener('click', toggleForm);
      refreshBtn.addEventListener('click', loadContactsFromSheets);
      nameInput.addEventListener('input', updatePreview);
      monthSelect.addEventListener('change', updatePreview);
      daySelect.addEventListener('change', updatePreview);
      submitBtn.addEventListener('click', handleSubmit);
      emailBtn.addEventListener('click', sendEmail);
      
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          render();
        });
      });
    }

    function toggleForm() {
      const isOpen = formContainer.classList.contains('show');
      if (isOpen) {
        formContainer.classList.remove('show');
        toggleFormBtn.textContent = '+ Agregar';
        resetForm();
      } else {
        formContainer.classList.add('show');
        toggleFormBtn.textContent = 'Cancelar';
      }
    }

    function resetForm() {
      nameInput.value = '';
      monthSelect.value = '1';
      daySelect.value = '1';
      phoneInput.value = '';
      zodiacPreview.classList.remove('show');
      submitBtn.disabled = true;
    }

    function updatePreview() {
      const name = nameInput.value.trim();
      submitBtn.disabled = !name;
      
      if (name) {
        const sign = getZodiacSign(parseInt(monthSelect.value), parseInt(daySelect.value));
        zodiacPreview.textContent = `${sign.symbol} ${name} es ${sign.name}`;
        zodiacPreview.classList.add('show');
      } else {
        zodiacPreview.classList.remove('show');
      }
    }

    function getZodiacSign(month, day) {
      for (const sign of ZODIAC_SIGNS) {
        const [startMonth, startDay] = sign.start;
        const [endMonth, endDay] = sign.end;
        if (sign.name === 'Capricornio') {
          if ((month === 12 && day >= 22) || (month === 1 && day <= 19)) return sign;
        } else {
          if ((month === startMonth && day >= startDay) || (month === endMonth && day <= endDay)) return sign;
        }
      }
      return ZODIAC_SIGNS[0];
    }

    function getDaysUntilBirthday(month, day) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const currentYear = today.getFullYear();
      let birthday = new Date(currentYear, month - 1, day);
      if (birthday < today) birthday = new Date(currentYear + 1, month - 1, day);
      return Math.ceil((birthday - today) / (1000 * 60 * 60 * 24));
    }

    async function handleSubmit() {
      const name = nameInput.value.trim();
      if (!name) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Guardando...';

      const contact = {
        nombre: name,
        mes: parseInt(monthSelect.value),
        dia: parseInt(daySelect.value),
        telefono: phoneInput.value.trim()
      };

      const success = await addContactToSheets(contact);
      
      if (success) {
        showNotification('Guardado en Google Sheets ✓', 'success');
        toggleForm();
      }
      
      submitBtn.disabled = false;
      submitBtn.textContent = 'Agregar contacto';
    }

    function getFilteredContacts() {
      const sorted = [...contacts].sort((a, b) => 
        getDaysUntilBirthday(a.mes, a.dia) - getDaysUntilBirthday(b.mes, b.dia)
      );
      
      if (currentFilter === 'week') return sorted.filter(c => getDaysUntilBirthday(c.mes, c.dia) <= 7);
      if (currentFilter === 'month') return sorted.filter(c => getDaysUntilBirthday(c.mes, c.dia) <= 30);
      return sorted;
    }

    function render() {
      const filtered = getFilteredContacts();
      const weekBdays = contacts.filter(c => getDaysUntilBirthday(c.mes, c.dia) <= 7);
      const todayBdays = contacts.filter(c => getDaysUntilBirthday(c.mes, c.dia) === 0);

      totalCount.textContent = contacts.length;
      weekCount.textContent = weekBdays.length;

      // Today alert
      if (todayBdays.length > 0) {
        todayAlert.classList.add('show');
        todayNames.textContent = todayBdays.map(c => c.nombre).join(', ');
      } else {
        todayAlert.classList.remove('show');
      }

      // Email button
      if (weekBdays.length > 0) {
        emailSection.classList.add('show');
      } else {
        emailSection.classList.remove('show');
      }

      // Contacts list
      if (filtered.length === 0) {
        contactsList.innerHTML = `
          <div class="empty-state">
            <div class="icon">☆</div>
            <p>${contacts.length === 0 ? 'Agrega tu primer contacto' : 'No hay cumpleaños en este período'}</p>
          </div>
        `;
      } else {
        contactsList.innerHTML = filtered.map(c => {
          const sign = getZodiacSign(c.mes, c.dia);
          const days = getDaysUntilBirthday(c.mes, c.dia);
          const daysClass = days === 0 ? 'today' : days <= 7 ? 'soon' : 'later';
          const daysText = days === 0 ? '¡Hoy!' : days === 1 ? 'Mañana' : `${days}d`;
          
          let whatsappBtn = '';
          if (c.telefono) {
            const telLimpio = c.telefono.replace(/[^0-9]/g, '');
            const mensajeWA = `¡Feliz cumpleaños ${c.nombre}, que pases un excelente día! 🎂🎉`;
            whatsappBtn = `<a href="https://wa.me/${telLimpio}?text=${encodeURIComponent(mensajeWA)}" target="_blank" class="action-btn whatsapp" title="Enviar WhatsApp">💬</a>`;
          }
          
          return `
            <div class="contact-card element-${sign.element}">
              <div class="contact-info">
                <span class="contact-symbol">${sign.symbol}</span>
                <div>
                  <div class="contact-name">${c.nombre}</div>
                  <div class="contact-details">${c.dia} ${MONTHS_SHORT[c.mes - 1]} · ${sign.name}</div>
                </div>
              </div>
              <div class="contact-right">
                <span class="days-badge ${daysClass}">${daysText}</span>
                <div class="card-actions" style="opacity: 1;">
                  ${whatsappBtn}
                </div>
              </div>
            </div>
          `;
        }).join('');
      }
    }

    function sendEmail() {
      const upcoming = contacts
        .filter(c => getDaysUntilBirthday(c.mes, c.dia) <= 7)
        .sort((a, b) => getDaysUntilBirthday(a.mes, a.dia) - getDaysUntilBirthday(b.mes, b.dia));

      let body = '🎂 Cumpleaños esta semana:\n\n';
      upcoming.forEach(c => {
        const sign = getZodiacSign(c.mes, c.dia);
        const days = getDaysUntilBirthday(c.mes, c.dia);
        const dayText = days === 0 ? '¡HOY!' : days === 1 ? 'Mañana' : `En ${days} días`;
        body += `${sign.symbol} ${c.nombre} - ${c.dia} ${MONTHS_SHORT[c.mes - 1]} (${dayText})\n`;
      });

      const subject = '🎂 Recordatorio: Cumpleaños esta semana';
      const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=celp002@gmail.com&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.open(gmailUrl, '_blank');
      showNotification('Abriendo Gmail...', 'success');
    }

    function showNotification(msg, type) {
      notification.textContent = msg;
      notification.className = `notification ${type} show`;
      setTimeout(() => notification.classList.remove('show'), 3000);
    }

    // Start app
    init();
  </script>
</body>
</html>
